
<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三十日無塑實踐</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 載入 React 相關腳本 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;600;900&display=swap');
        
        html {
            -webkit-text-size-adjust: 100%; /* 防止 iOS Safari 自動縮放字體 */
            -moz-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif !important;
        }

        .font-serif-tc {
            font-family: 'Noto Serif TC', serif !important;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-scale-in {
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes shine {
            0% {
                left: -100%;
            }

            100% {
                left: 100%;
            }
        }

        .shine-effect::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: skewX(-25deg);
            animation: shine 2s infinite;
        }

        @keyframes customPulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.95;
                transform: scale(1.01);
            }
        }

        .animate-urgent {
            animation: customPulse 2.5s infinite ease-in-out;
        }

        @keyframes timerBar {
            from {
                width: 100%;
            }

            to {
                width: 0%;
            }
        }

        .animate-timer-bar {
            animation: timerBar 3s linear forwards;
        }

        @keyframes bounce-x {

            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(4px);
            }
        }

        .animate-bounce-x {
            animation: bounce-x 1s infinite ease-in-out;
        }

        .ui.selection.dropdown {
            width: 100% !important;
            border-radius: 0.75rem !important;
            padding: 0.75rem 1rem !important;
            border: 1px solid #e2e8f0 !important;
            background-color: #f8fafc !important;
            font-family: 'Noto Sans TC', sans-serif !important;
            font-weight: 700 !important;
            color: #334155 !important;
        }

        .ui.selection.dropdown .menu {
            border-radius: 0 0 0.75rem 0.75rem !important;
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        // 🌟 終極安全防禦：直接用原生 JS 強行鎖定手機字體，不碰 CSS、不碰 JSX，100% 不會當機！
        document.body.style.webkitTextSizeAdjust = '100%';
        document.body.style.textSizeAdjust = '100%';

        const API_URL = "https://script.google.com/macros/s/AKfycbwWf2ONqm7TKsCZBIyzsxIsV4TDTjarrtVm2xtKSvSFnBKYour_Xd3meZ0SDICQRXYVlQ/exec";

        const TOUR_STEPS = [
            {   // 1. 歡迎
                title: <span className="flex items-center gap-2"><img src="https://paymiou.github.io/paymiou/August/sea.png" className="w-5 h-5 object-contain inline-block" />歡迎加入 解開塑縛 三十無塑實踐！</span>,
                content: (<span>在這30天 (8/2~8/31) 的挑戰中，依法實踐無塑生活吧！<br /><span className="text-red-500 font-bold block mt-1 text-[11px]">※此次活動無回補機制，記得天天登入、行持不間斷喔！</span></span>),
                target: "header"
            },
            {   // 2. 積分與稱號
                title: <span className="flex items-center gap-2"><img src="https://paymiou.github.io/paymiou/August/bluestar.png" className="w-5 h-5 object-contain inline-block" />記分表與獲獎條件<img src="https://paymiou.github.io/paymiou/August/trophy.png" className="w-5 h-5 object-contain inline-block" /></span>,
                content: (
                    <span>
                        【初心覺醒】為起始稱號，點擊ⓘ 可查看分數對應稱號表<br />
                        積分(PT) 可透由「法語核心任務、淨塑行持項目」來獲取。
                        <span className="text-red-500 font-bold block mt-2 text-[11px]">
                            ※獲獎條件：各項積分加總、完成四週回饋且班幹部審核通過！
                        </span>
                    </span>
                ),
                target: "score-panel"
            },
            {   // 3. 法語成就頁籤
                title: <span className="flex items-center gap-2"><img src="https://paymiou.github.io/paymiou/August/waves.png" className="w-5 h-5 object-contain inline-block" />解鎖法語成就</span>,
                content: (<span>每日抽取一則法語並完成「核心任務<img src="https://paymiou.github.io/paymiou/August/bluestar.png" className="w-4 h-4 object-contain inline-block mx-0.5 align-text-bottom" alt="star" />」，即可解鎖法語成就！</span>),
                target: "nav-collection"
            },
            {   // 4. 週回報
                title: <span className="flex items-center gap-2"><img src="https://paymiou.github.io/paymiou/August/contract.png" className="w-5 h-5 object-contain inline-block" />每週實踐回報</span>,
                content: (<span>每週五開放、週日關閉。提交 50 字心得與 3 張照片，會由班幹部審核<img src="https://paymiou.github.io/paymiou/August/energy-consumption.png" className="w-4 h-4 object-contain inline-block mx-0.5 align-text-bottom" alt="star" />！</span>),
                target: "nav-report"
            },
            {   // 5. 排行榜
                title: <span className="flex items-center gap-2"><img src="https://paymiou.github.io/paymiou/August/heart.png" className="w-5 h-5 object-contain inline-block" />排行榜-點讚系統</span>,
                content: (<span>可於排行榜中查看其他同學的實踐回饋，觀摩學習、互相點讚、加油打氣喔！<br /><span className="text-red-500 font-bold block mt-1 text-[11px]">※讚積分(PT) 也是獲獎條件之一喔！</span></span>),
                target: "nav-ranking"
            },
            {   // 6. 恭請今日法語
                title: <span className="flex items-center gap-2"><img src="https://paymiou.github.io/paymiou/August/waves.png" className="w-5 h-5 object-contain inline-block" />恭請今日法語</span>,
                content: "事不宜遲，現在就來抽取今日法語吧！",
                target: "draw-btn",
                isInteractive: true
            },
            {   // 🌟 7. 新增：法語核心任務
                title: <span className="flex items-center gap-2"><img src="https://paymiou.github.io/paymiou/August/bluestar.png" className="w-5 h-5 object-contain inline-block" />法語核心任務</span>,
                content: "此任務為「解鎖法語成就」的關鍵所在！實踐完成，請打勾、上傳，即可解鎖法語！",
                target: "core-task"
            },
            {   // 8. 原第七步：行持積分項目
                title: <span className="flex items-center gap-2"><img src="https://paymiou.github.io/paymiou/August/reef.png" className="w-5 h-5 object-contain inline-block" />如何獲得行持績分？</span>,
                content: (<span>每日的淨塑實踐都可以累積積分。<br />項目可「參考清單」或「<img src="https://paymiou.github.io/paymiou/August/plus.png" className="w-4 h-4 object-contain inline-block mx-0.5 align-text-bottom" alt="plus" />新增更多淨塑行動」。完成後勾選、上傳，即可獲得行持積分！<span className="text-red-500 font-bold block mt-2 text-[11px]">※項目需符合「淨塑、減塑」、同類型項目無法重複新增！</span></span>),
                target: "task-area"
            },
            {   // 🌟 9. 新增：陪伴您的水母
                title: <span className="flex items-center gap-2"><img src="https://paymiou.github.io/paymiou/August/sea.png" className="w-5 h-5 object-contain inline-block" />陪伴您的水母</span>,
                content: "忘記如何操作時，可點擊「水母」，即可再次查看「操作說明」或「開啟導覽視窗」！",
                target: "jellyfish"
            }
        ];

        // ==========================================
        // 終極修正：新增 Sites 沙盒專用強效 Cookie 記憶器
        // ==========================================
        const setSandboxCookie = (name, value, days) => {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            // 🌟 關鍵：必須加上 SameSite=None; Secure，否則 Google Sites 的 iframe 絕對讀不到
            document.cookie = `${name}=${encodeURIComponent(value)}; expires=${date.toUTCString()}; path=/; SameSite=None; Secure`;
        };

        const getSandboxCookie = (name) => {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
            }
            return "";
        };

        const callJsonpApi = (action, params, onSuccess, onError) => {
            const callbackName = `jsonp_${action}_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
            let url = `${API_URL}?action=${action}&callback=${callbackName}&t=${Date.now()}`;

            Object.keys(params).forEach(key => {
                if (params[key] !== undefined && params[key] !== null) {
                    url += `&${key}=${encodeURIComponent(params[key])}`;
                }
            });

            let isTimeout = false;
            const timeoutId = setTimeout(() => {
                isTimeout = true;
                delete window[callbackName];
                if (onError) onError(new Error("伺服器無回應 (15秒逾時)，請檢查網路或稍後再試。"));
            }, 15000);

            window[callbackName] = (data) => {
                if (isTimeout) return;
                clearTimeout(timeoutId);
                delete window[callbackName];
                if (onSuccess) onSuccess(data);
            };

            const script = document.createElement('script');
            script.src = url;
            script.onerror = () => {
                if (isTimeout) return;
                clearTimeout(timeoutId);
                delete window[callbackName];
                if (onError) onError(new Error("網路連線遭拒！可能原因：\n1. 您的 GAS 後端程式碼有漏掉括號的語法錯誤\n2. 部署權限未設為「所有人」\n3. 剛更新但忘了發布「新版本」"));
            };
            document.body.appendChild(script);
            script.onload = () => document.body.removeChild(script);
        };

        const parseScoreStr = (val) => {
            if (val === undefined || val === null) return 0;
            const parsed = parseInt(val, 10);
            return isNaN(parsed) ? 0 : parsed;
        };

        const parseIdsStr = (val) => {
            if (val === undefined || val === null || val === "無" || val === "未解鎖" || val === "未完成 any 項目" || val === "") return [];
            if (Array.isArray(val)) return val.map(v => typeof v === 'object' ? (v.id || v) : parseInt(v, 10)).filter(n => !isNaN(n) && n >= 1 && n <= 40);
            if (typeof val === 'string') {
                try {
                    const parsed = JSON.parse(val);
                    if (Array.isArray(parsed)) {
                        return parsed.map(v => typeof v === 'object' ? (v.id || v) : parseInt(v, 10)).filter(n => !isNaN(n) && n >= 1 && n <= 30);
                    }
                } catch (e) { }

                const exactMatches = [...val.matchAll(/第(\d+)則/g)].map(m => parseInt(m[1], 10));
                if (exactMatches.length > 0) {
                    return exactMatches.filter(n => !isNaN(n) && n >= 1 && n <= 30);
                }

                const matches = val.match(/\d+/g);
                if (matches) {
                    return matches.map(s => parseInt(s, 10)).filter(n => !isNaN(n) && n >= 1 && n <= 30);
                }
                return [];
            }
            if (typeof val === 'number') {
                if (val >= 1 && val <= 30) return [val];
                return [];
            }
            return [];
        };

        const getDirectImageUrl = (url) => {
            if (!url) return url;
            if (url.startsWith('data:image')) return url;
            let fileId = null;
            const regex1 = /\/file\/d\/([a-zA-Z0-9_-]+)/;
            const regex2 = /[?&]id=([a-zA-Z0-9_-]+)/;
            const match1 = url.match(regex1);
            if (match1 && match1[1]) {
                fileId = match1[1];
            } else {
                const match2 = url.match(regex2);
                if (match2 && match2[1]) {
                    fileId = match2[1];
                }
            }
            if (fileId) {
                return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;
            }
            return url;
        };

        // ==========================================
        // 優化：Search Selection Dropdown 元件
        // ==========================================
        const SearchSelect = ({ options, value, onChange, placeholder }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [search, setSearch] = useState('');
            const containerRef = useRef(null);
            const inputRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (e) => {
                    if (containerRef.current && !containerRef.current.contains(e.target)) {
                        setIsOpen(false);
                        setSearch('');
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            useEffect(() => {
                if (isOpen && inputRef.current) {
                    inputRef.current.focus();
                }
            }, [isOpen]);

            // ==========================================
            // 核心修改：智慧模糊搜尋過濾邏輯
            // ==========================================
            const filteredOptions = useMemo(() => {
                const cleanSearch = search.trim().toLowerCase();
                if (!cleanSearch) return options;

                // 判斷使用者是否完全輸入純數字 (例如: 23002)
                const isPureNumber = /^\d+$/.test(cleanSearch);

                return options.filter(opt => {
                    const optStr = String(opt).toLowerCase();

                    if (isPureNumber) {
                        // 如果是純數字，把班別內的所有非數字移除 (例如: "23春002" -> "23002") 再進行比對
                        const optNumbers = optStr.replace(/\D/g, '');
                        return optNumbers.includes(cleanSearch);
                    } else {
                        // 如果包含中文，走一般文字包含比對 (例如: 輸入 "23春" 或 "002")
                        return optStr.includes(cleanSearch);
                    }
                });
            }, [options, search]);

            return (
                <div ref={containerRef} className="relative w-full text-left">
                    <div
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-[14px] font-black flex items-center justify-between cursor-pointer hover:border-slate-300 transition-colors relative"
                    >
                        {isOpen ? (
                            <input
                                ref={inputRef}
                                type="text"
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                                placeholder={value || placeholder}
                                className="w-full bg-transparent text-slate-800 font-black focus:outline-none placeholder-slate-400"
                                onClick={(e) => e.stopPropagation()}
                            />
                        ) : (
                            <span className={value ? "text-slate-800" : "text-slate-400"}>
                                {value || placeholder}
                            </span>
                        )}
                        <span className="text-slate-400 text-xs transition-transform duration-200 pointer-events-none" style={{ transform: isOpen ? 'rotate(180deg)' : 'rotate(0deg)' }}>
                            ▼
                        </span>
                    </div>

                    {isOpen && (
                        <div className="absolute z-[999] w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-xl overflow-hidden animate-fade-in" style={{ animationDuration: '0.15s' }}>
                            <div className="max-h-48 overflow-y-auto hide-scrollbar">
                                {filteredOptions.length > 0 ? (
                                    filteredOptions.map((opt, idx) => (
                                        <div
                                            key={idx}
                                            onClick={() => {
                                                onChange(opt);
                                                setIsOpen(false);
                                                setSearch('');
                                            }}
                                            className={`px-4 py-2.5 text-xs font-black cursor-pointer transition-colors ${value === opt ? 'bg-blue-50 text-blue-700' : 'text-slate-700 hover:bg-slate-100'}`}
                                        >
                                            {opt}
                                        </div>
                                    ))
                                ) : (
                                    <div className="px-4 py-3 text-xs font-bold text-slate-400 text-center">找不到此班別</div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const AuthScreen = ({ onLoginSuccess }) => {
            const [view, setView] = useState('login');
            const [classList, setClassList] = useState([]);
            const [alertData, setAlertData] = useState(null);

            const [loginClass, setLoginClass] = useState(() => localStorage.getItem('saved_login_class') || '');
            const [loginPhone, setLoginPhone] = useState(() => localStorage.getItem('saved_login_phone') || '');
            const [regClass, setRegClass] = useState('');
            const [regName, setRegName] = useState('');
            const [regEmail, setRegEmail] = useState('');
            const [regPhone, setRegPhone] = useState('');
            const [rememberMe, setRememberMe] = useState(() => localStorage.getItem('saved_remember_me') !== 'false');

            useEffect(() => {
                setAlertData({ message: '載入環境資料中，請稍候...', type: 'loading' });
                callJsonpApi('getClasses', {},
                    (data) => {
                        setClassList(data && data.length > 0 ? data : ['無法載入名單']);
                        setAlertData(null);
                    },
                    (err) => {
                        setClassList(['無法載入名單']);
                        setAlertData(null);
                    }
                );
            }, []);

            const showAlert = (message, type) => {
                setAlertData({ message, type });
                if (type !== 'loading') {
                    setTimeout(() => setAlertData(null), 3500);
                }
            };

            const doAction = (type) => {
                const classRule = /^\d{2}[春秋增善備宗]\d{3}$/;

                if (type === 'register') {
                    const classNum = regClass.trim();
                    const name = regName.trim();
                    const email = regEmail.trim();
                    const lastThree = regPhone.trim();

                    if (!classRule.test(classNum)) {
                        showAlert("研討班別格式錯誤！\n請輸入「2個數字 + 春/秋/增/善/備/宗 + 3個數字」", "error"); return;
                    }
                    if (!name || !/^\d{3}$/.test(lastThree)) {
                        showAlert("請檢查姓名或手機末三碼是否正確", "error"); return;
                    }
                    if (email === "") {
                        showAlert("註冊失敗：E-mail 為必填欄位！", "error"); return;
                    }
                    if (email !== "" && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                        showAlert("E-mail 格式不正確", "error"); return;
                    }

                    showAlert("資料建立中，請稍候...", "loading");
                    callJsonpApi('register', { classNum, name, email, lastThree },
                        (data) => {
                            if (data.result === "success") {
                                showAlert(data.message, "success");
                                setLoginClass(classNum);
                                setLoginPhone(lastThree);
                                setTimeout(() => { setView('login'); setAlertData(null); }, 3000);
                            } else {
                                showAlert(data.message || "發生未知錯誤", "error");
                            }
                        },
                        (err) => showAlert(err.message, "error")
                    );
                } else {
                    const c = loginClass.trim();
                    const p = loginPhone.trim();

                    if (!classRule.test(c)) {
                        showAlert("研討班別格式錯誤！", "error"); return;
                    }
                    if (!/^\d{3}$/.test(p)) {
                        showAlert("請確認手機末三碼(需為3位數字)", "error"); return;
                    }

                    if (rememberMe) {
                        localStorage.setItem('saved_login_class', c);
                        localStorage.setItem('saved_login_phone', p);
                        localStorage.setItem('saved_remember_me', 'true');
                    } else {
                        localStorage.removeItem('saved_login_class');
                        localStorage.removeItem('saved_login_phone');
                        localStorage.setItem('saved_remember_me', 'false');
                    }

                    showAlert("會員登入中，請稍候...", "loading");
                    callJsonpApi('login', { classNum: c, lastThree: p },
                        (data) => {
                            if (data.result === "success") {
                                // ❌ 刪除原本複雜的 Date 扣來扣去公式
                                // ⭕ 直接拿後端給的精準天數，若活動還沒開始（小於1）保底秀第1天
                                const currentDay = data.currentDay && data.currentDay > 0 ? data.currentDay : 1;

                                //showAlert(data.userName ? `🎉 歡迎回來 ${data.userName}\n已進入第 ${currentDay} 天無塑實踐` : "🎉 登入成功！", "success");
                                showAlert(data.message || "🎉 登入成功！", "success");
                                setTimeout(() => { onLoginSuccess(data, rememberMe, c); }, 1500);
                            } else {
                                showAlert(data.message || "班別或密碼錯誤", "error");
                            }
                        },
                        (err) => showAlert(err.message, "error")
                    );
                }
            };

            return (
                <div className="w-full min-h-screen max-w-[360px] mx-auto relative flex flex-col justify-center px-6 border-x border-slate-200 overflow-hidden bg-gradient-to-br from-sky-50 via-blue-50 to-cyan-100">

            const len1 = s1.length, len2 = s2.length;
            const matrix = Array.from({ length: len1 + 1 }, () => Array(len2 + 1).fill(0));
            for (let i = 0; i <= len1; i++) matrix[i][0] = i;
            for (let j = 0; j <= len2; j++) matrix[0][j] = j;
            for (let i = 1; i <= len1; i++) {
                for (let j = 1; j <= len2; j++) {
                    const cost = s1[i - 1] === s2[j - 1] ? 0 : 1;
                    matrix[i][j] = Math.min(matrix[i - 1][j] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j - 1] + cost);
                }
            }
            const levSim = 1 - matrix[len1][len2] / Math.max(len1, len2);

            // 🌟 同事新增：增加字元重疊率判斷 (解決語序顛倒問題)
            const set1 = new Set(s1.split(''));
            const set2 = new Set(s2.split(''));
            let intersection = 0;
            set1.forEach(char => {
                if (set2.has(char)) intersection++;
            });
            const minLen = Math.min(set1.size, set2.size);
            const overlapSim = minLen > 0 ? intersection / minLen : 0;

            return Math.max(levSim, overlapSim);

            const isManualTourRef = useRef(false);
            // 🌟 新增：用來即時顯示上傳文字與百分比的狀態
// 🌟 新增：用來即時顯示上傳文字與百分比的狀態

            // 🌟 新增：記錄玩家手動點選查看的週別 ID (w1~w4)

            // 🌟 核心功能新增：排行榜智慧追蹤錨點

            // 🌟 核心功能新增：智慧監聽器，只有在「排行榜分頁打開」且「轉圈圈完全結束」時，才精準執行置頂捲動
            useEffect(() => {

            // ===========================================================
            // 🌟 智慧週報提示卡片控制器 (全新支援小圓點點擊連動功能)
            // ===========================================================
            const weekNotificationCard = useMemo(() => {
                // 💡 智慧分流：若玩家有手動點選某週，就強制單獨檢查那一週；否則依原本邏輯由最新週倒著往前查
                const startIndex = selectedWeekId ? WEEKLY_CONFIG.findIndex(c => c.id === selectedWeekId) : WEEKLY_CONFIG.length - 1;
                const endIndex = selectedWeekId ? startIndex : 0;

                for (let i = startIndex; i >= endIndex; i--) {
                    const cfg = WEEKLY_CONFIG[i];
                    if (!cfg) continue;
                    const status = weeklyReports[cfg.id] || { submitted: false, approved: false };

                    // 🔵 狀態三：審核完成 (科技青藍燈) ➔ 點選時強迫顯示，非點選時維持24小時內才顯示
                    if (status.approved) {
                        const localKey = `approved_seen_time_${cfg.id}`;
                        let firstSeenTime = localStorage.getItem(localKey);
                        if (!firstSeenTime) {
                            firstSeenTime = Date.now().toString();
                            localStorage.setItem(localKey, firstSeenTime);
                        }
                        const elapsed = Date.now() - parseInt(firstSeenTime);
                        const oneDayInMs = 24 * 60 * 60 * 1000;

                        if (selectedWeekId || elapsed < oneDayInMs) {
                            return {
                                title: `${cfg.weekName}回饋~班幹部已審核通過`,
                                subTitle: `可以開始醞釀下一週的心得受用囉！`,
                                bgClass: "from-cyan-600 via-cyan-500 to-teal-500 shadow-[0_8px_20px_rgba(6,182,212,0.3)] border-cyan-400/50",
                                icon: "https://paymiou.github.io/paymiou/August/like.png",
                                isClickable: false,
                                showArrow: false
                            };
                        }
                        if (!selectedWeekId) continue;
                    }

                    // 🟡 狀態二：填寫完成、審核中 (橘黃色閃爍能量燈)
                    if (status.submitted && !status.approved) {
                        return {
                            title: `${cfg.weekName}回饋：班幹部審核中`,
                            subTitle: `請耐心等待班幹部審核中...`,
                            bgClass: "from-amber-600 via-amber-500 to-orange-500 shadow-[0_8px_20px_rgba(245,158,11,0.3)] border-amber-400/50",
                            icon: "https://paymiou.github.io/paymiou/August/hourglass.png",
                            isClickable: false,
                            showArrow: false
                        };
                    }

                    // 🔴 狀態一：尚未填寫 (紅燈) ➔ 點選時若已截止(past)，貼心切換為截止提示
                    const isOpen = Date.now() >= cfg.openTime && Date.now() <= cfg.closeTime;
                    const isPast = Date.now() > cfg.closeTime;
                    if (!status.submitted && (isOpen || (selectedWeekId && isPast))) {
                        return {
                            title: isPast ? `${cfg.weekName}回報已截止` : `${cfg.weekName}回報開放中！`,
                            subTitle: isPast ? `非常抱歉，本週已錯過填寫時間囉` : `點擊前往填寫本週的實踐體會`,
                            bgClass: isPast ? "from-slate-600 via-slate-500 to-gray-500 shadow-[0_8px_20px_rgba(100,116,139,0.3)] border-slate-400/50" : "from-red-600 via-red-500 to-rose-500 shadow-[0_8px_20px_rgba(239,68,68,0.3)] border-red-400/50",

            }, [weeklyReports, selectedWeekId]); // 🌟 記得將 selectedWeekId 補入監聽陣列中


            const handleTourNext = () => {
                let nextIdx = tourIndex + 1; // 🌟 1. 將 const 改成 let 才能修改數值

                // 🌟 2. 智慧跳過！如果是手動開啟，且下一步是第六步「抽法語」(索引值 5)，直接強行進位到第七步「核心任務」(索引值 6)！
                if (isManualTourRef.current && nextIdx === 5) {
                    nextIdx = 6;
                }

                if (nextIdx < TOUR_STEPS.length) {
                    const nextStep = TOUR_STEPS[nextIdx];

                    // 1. 智慧分頁預切換
                    if (nextStep.target === 'nav-report') setActiveTab('report');
                    if (nextStep.target === 'nav-ranking') setActiveTab('ranking');

                    /* 🌟 核心修正：當下一步目標是 nav-collection（第三步）時，將分頁自動切換到 collection（法語成就） */
                    if (nextStep.target === 'nav-collection') setActiveTab('collection');
                    // 🌟 修正：讓第七步 (core-task) 也能在跳轉時，自動把分頁切換回每日任務！
                    if (nextStep.target === 'task-area' || nextStep.target === 'draw-btn' || nextStep.target === 'core-task') {
                        setActiveTab('daily');
                    }
                    setTourIndex(nextIdx);

                    // ========================================================
                    // 🌟 核心優化：將「第八步雙高光」獨立出來，不與常規步驟疊加時間！
                    // ========================================================
                    if (nextStep.target === 'task-area') {
                        setActiveTab('daily'); // 立即切換到每日分頁

                        // 給分頁 150ms 渲染時間後，立刻精準執行向上捲動
                        setTimeout(() => {
                            const el1 = document.getElementById('tour-task-header');
                            const el2 = document.getElementById('tour-add-action-btn');

                            if (el1 && el2) {
                                // 讓標題列完美貼頂（扣除 65px）
                                const absoluteTop = el1.getBoundingClientRect().top + window.pageYOffset;
                                window.scrollTo({
                                    top: Math.max(0, absoluteTop - 65),
                                    behavior: 'smooth'
                                });

                                // 畫面捲動靜止後 (350ms)，立刻精準亮起雙高光
                                setTimeout(() => {
                                    const r1 = el1.getBoundingClientRect();
                                    const r2 = el2.getBoundingClientRect();

                                    setActiveSpotlight({
                                        target: 'task-area',
                                        isDual: true,
                                        box1: { top: r1.top, left: r1.left, width: r1.width, height: r1.height },
                                        box2: { top: r2.top, left: r2.left, width: r2.width, height: r2.height }
                                    });
                                }, 350);
                            }
                        }, 150);
                        return; // 🎯 成功攔截！不讓它走到底下的常規單高光步驟
                    }

                    // ========================================================
                    // 2. 常規單高光步驟處理區 (延遲 100ms 預留給分頁切換即可)
                    // ========================================================
                    setTimeout(() => {
                        let idMap = {
                            'score-panel': 'tour-score-panel',
                            'nav-collection': 'tour-nav-collection',
                            'nav-report': 'tour-nav-report',
                            'nav-ranking': 'tour-nav-ranking',
                            'draw-btn': 'tour-draw-btn',
                            'core-task': 'tour-core-task',
                            'jellyfish': 'tour-jellyfish'
                        };
                        const targetId = idMap[nextStep.target];
                        const el = document.getElementById(targetId);

                        if (el) {
                            // 🌟 處理第九步「水母」：強制捲動回最頂端，並借用第二步坐標優化定位
                            if (nextStep.target === 'jellyfish') {
                                window.scrollTo({ top: 0, behavior: 'smooth' });

                                setTimeout(() => {
                                    const basePanel = document.getElementById('tour-score-panel');
                                    if (basePanel) {
                                        const panelRect = basePanel.getBoundingClientRect();
                                        setActiveSpotlight({
                                            top: panelRect.top - 30,
                                            left: panelRect.left - 12,
                                            width: 56,
                                            height: 70,
                                            target: nextStep.target
                                        });
                                    }
                                }, 350);

                                // 🌟 處理第六步「抽籤按鈕」：專屬置中邏輯
                            } else if (nextStep.target === 'draw-btn') {
                                const rect = el.getBoundingClientRect();
                                const absoluteTop = rect.top + window.pageYOffset;
                                const targetScrollTop = absoluteTop - (window.innerHeight / 2) + (rect.height / 2);
                                const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                                window.scrollTo({ top: Math.min(maxScroll, Math.max(0, targetScrollTop)), behavior: 'smooth' });

                                setTimeout(() => {
                                    const finalRect = el.getBoundingClientRect();
                                    setActiveSpotlight({
                                        top: finalRect.top, left: finalRect.left,
                                        width: finalRect.width, height: finalRect.height,
                                        target: nextStep.target
                                    });
                                }, 300);

                                // 🌟 處理其他預設步驟 (包含第二、三、四、五、七步)
                            } else {
                                const rect = el.getBoundingClientRect();
                                const absoluteTop = rect.top + window.pageYOffset;
                                const targetScrollTop = absoluteTop - (window.innerHeight / 2) + (rect.height / 2);
                                const maxScroll = document.documentElement.scrollHeight - window.innerHeight;

                                window.scrollTo({
                                    top: Math.min(maxScroll, Math.max(0, targetScrollTop)),
                                    behavior: 'smooth'
                                });

                                setTimeout(() => {
                                    const finalRect = el.getBoundingClientRect();
                                    let adjustedTop = finalRect.top;
                                    let adjustedHeight = finalRect.height;

                                    // 第三步的綠框高度對齊微調
                                    if (nextStep.target === 'nav-collection') {
                                        adjustedTop = finalRect.top + 4;
                                        adjustedHeight = finalRect.height - 4;
                                    }

                                    setActiveSpotlight({
                                        top: adjustedTop,
                                        left: finalRect.left,
                                        width: finalRect.width,
                                        height: adjustedHeight,
                                        target: nextStep.target
                                    });
                                }, 350);
                            }
                        } else {
                            setActiveSpotlight(null);
                        }
                    }, 250);

                } else {
                    // 導覽結束時的安全重置機制
                    setTourIndex(-1);
                    setActiveSpotlight(null);
                    localStorage.setItem('has_seen_tour_2026', 'true');
                    isManualTourRef.current = false; // 記得將手動開啟標記還原為 false
                }
            };

            // 🌟 核心新增：回上一步的智慧控制邏輯 (終極萬用版)
            const handleTourPrev = () => {
                if (tourIndex <= 0) return;
                const prevIndex = tourIndex - 1;
                setTourIndex(prevIndex);
                const nextStep = TOUR_STEPS[prevIndex];

                // 🌟 1. 處理返回第八步 (雙高光關卡)
                if (nextStep.target === 'task-area') {
                    setActiveTab('daily');

                    setTimeout(() => {
                        const el1 = document.getElementById('tour-task-header');
                        const el2 = document.getElementById('tour-add-action-btn');

                        if (el1 && el2) {
                            // 讓標題列完美貼頂（扣除 65px）
                            const absoluteTop = el1.getBoundingClientRect().top + window.pageYOffset;
                            window.scrollTo({
                                top: Math.max(0, absoluteTop - 65),
                                behavior: 'smooth'
                            });

                            // 延遲 350ms，等捲動「完全靜止」後再畫雙綠框
                            setTimeout(() => {
                                const r1 = el1.getBoundingClientRect();
                                const r2 = el2.getBoundingClientRect();

                                setActiveSpotlight({
                                    target: 'task-area',
                                    isDual: true,
                                    box1: { top: r1.top, left: r1.left, width: r1.width, height: r1.height },
                                    box2: { top: r2.top, left: r2.left, width: r2.width, height: r2.height }
                                });
                            }, 350);
                        }
                    }, 150);
                    return; // 攔截完畢，結束此函式
                }

                // 🌟 2. 處理返回其他步驟
                let idMap = {
                    'score-panel': 'tour-score-panel',
                    'nav-collection': 'tour-nav-collection',
                    'nav-report': 'tour-nav-report',
                    'nav-ranking': 'tour-nav-ranking',
                    'draw-btn': 'tour-draw-btn',
                    'core-task': 'tour-core-task',
                    'jellyfish': 'tour-jellyfish' // 確保水母 ID 在這裡
                };

                const targetId = idMap[nextStep.target];
                const el = document.getElementById(targetId);

                if (el) {
                    // 🌟 1. 處理第九步「水母」：借用第二步(記分板)的坐標來縮小定位
                    if (nextStep.target === 'jellyfish') {
                        window.scrollTo({ top: 0, behavior: 'smooth' });

                        setTimeout(() => {
                            // 💡 關鍵：直接抓取第二步的「整個記分板」作為基準點
                            const basePanel = document.getElementById('tour-score-panel');

                            if (basePanel) {
                                const panelRect = basePanel.getBoundingClientRect();

                                // 🌟 把範圍縮小，精準對齊在左上角的水母身上
                                // 記分板的 top 往上推 24px，left 往左推 12px，並把長寬縮小成 56x56 的專屬方框
                                setActiveSpotlight({
                                    top: panelRect.top - 30,
                                    left: panelRect.left - 12,
                                    width: 56,
                                    height: 70,
                                    target: nextStep.target
                                });
                            }
                        }, 350);

                        // 🌟 處理第六步「抽籤按鈕」：專屬置中邏輯
                    } else if (nextStep.target === 'draw-btn') {
                        const rect = el.getBoundingClientRect();
                        const absoluteTop = rect.top + window.pageYOffset;
                        const targetScrollTop = absoluteTop - (window.innerHeight / 2) + (rect.height / 2);
                        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                        window.scrollTo({ top: Math.min(maxScroll, Math.max(0, targetScrollTop)), behavior: 'smooth' });

                        setTimeout(() => {
                            const finalRect = el.getBoundingClientRect();
                            setActiveSpotlight({
                                top: finalRect.top, left: finalRect.left,
                                width: finalRect.width, height: finalRect.height,
                                target: nextStep.target
                            });
                        }, 300);

                        // 🌟 處理其他預設步驟 (包含第二、三、四、五、七步)
                    } else {
                        // 計算原始坐標並平滑置中捲動
                        const rect = el.getBoundingClientRect();
                        const absoluteTop = rect.top + window.pageYOffset;
                        const targetScrollTop = absoluteTop - (window.innerHeight / 2) + (rect.height / 2);
                        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;

                        window.scrollTo({
                            top: Math.min(maxScroll, Math.max(0, targetScrollTop)),
                            behavior: 'smooth'
                        });

                        // 延遲確保滑動結束才抓最終坐標
                        setTimeout(() => {
                            const finalRect = el.getBoundingClientRect();

                            let adjustedTop = finalRect.top;
                            let adjustedHeight = finalRect.height;

                            // 第三步的綠框高度對齊微調
                            if (nextStep.target === 'nav-collection') {
                                adjustedTop = finalRect.top + 4;
                                adjustedHeight = finalRect.height - 4;
                            }

                            setActiveSpotlight({
                                top: adjustedTop,
                                left: finalRect.left,
                                width: finalRect.width,
                                height: adjustedHeight,
                                target: nextStep.target
                            });
                        }, 350);
                    }
                } else {
                    // 找不到元素時的安全機制
                    setActiveSpotlight(null);
                }
            };

            // 啟動導覽 (升級版：可接收是否從按鈕開啟的標記)
            const startTour = (fromButton = false) => {
                isManualTourRef.current = fromButton; // 🌟 核心修正：把 true 或 false 記錄到我們剛剛宣告的 Ref 大腦中
                setActiveTab('daily');
                setTourIndex(-1); // 先重置
                setTimeout(() => handleTourNext(), 50); // 啟動第一步
            };

            // 關鍵：新手自動觸發機制（分數為0且今天沒抽卡）
            useEffect(() => {
                if (isLoggedIn && baseScore === 0 && dailyOracle === null) {
                    const hasSeenTour = localStorage.getItem('has_seen_tour_2026') === 'true';
                    if (!hasSeenTour) {
                        setTimeout(() => {
                            setActiveTab('daily');
                            setTourIndex(0);
                        }, 800);
                    }
                }
            }, [isLoggedIn, baseScore, dailyOracle]);

            // ==========================================
            // 調整安全登出函數，保留使用者的自訂口袋名單
            // ==========================================
            const forceLogout = (reason = "") => {
                // 1. 先把舊的自訂清單備份起來，防止被洗掉
                const currentExtraTasks = localStorage.getItem(`data_${userId}`)
                    ? JSON.parse(localStorage.getItem(`data_${userId}`)).extraTasks
                    : DEFAULT_TASKS;

                // 清除登入憑證與時間戳記
                localStorage.removeItem('no_plastic_logged_in');
                localStorage.removeItem('no_plastic_user_name');
                localStorage.removeItem('last_activity_time');
                localStorage.removeItem('no_plastic_logged_in_user_id');
                sessionStorage.removeItem('no_plastic_logged_in');
                sessionStorage.removeItem('no_plastic_user_name');
                sessionStorage.removeItem('no_plastic_user_id');

                // 2. 【核心修正】不直接刪除 data_${userId}，而是精準重置當天的勾選與分數狀態，但「留下 extraTasks」
                const clearDayData = {
                    lastTaskDate: new Date().toDateString(),
                    score: 0,
                    receivedLikesScore: 0,
                    completedTasks: [], // 清空勾選
                    syncedTasks: [],     // 清空同步
                    unlockedItems: unlockedItems, // 保留歷史成就
                    weeklyReports: weeklyReports, // 保留週報
                    myGivenLikes: myGivenLikes,   // 保留按讚紀錄
                    drawnOracleIds: drawnOracleIds,
                    currentOracle: null,          // 登出時強迫把今天抽到的法語蓋掉，防髒資料
                    lastOracleDate: null,
                    extraTasks: currentExtraTasks // ⭕ 完美保留使用者白天新增的所有自訂任務！
                };
                localStorage.setItem(`data_${userId}`, JSON.stringify(clearDayData));

                // 還原 React 畫面狀態
                setIsLoggedIn(false);
                setDailyOracle(null);
                setCompletedTasks([]);
                setSyncedTasks([]);
                setExtraTasks(currentExtraTasks); // 讓未登入前的畫面也記住這份清單

                if (reason) {
                    setCustomAlert({ title: "系統通知", message: reason });
                }
            };

            // ==========================================
            // 終極修正 1：雲端環境指紋自動重連機制 (完美破解 Google Sites iframe 隔離)
            // ==========================================
            useEffect(() => {
                const lastActivity = parseInt(localStorage.getItem('last_activity_time') || sessionStorage.getItem('last_activity_time') || "0", 10);
                const now = Date.now();
                const oneHour = 60 * 60 * 1000;

                // A. 【超時安全機制】閒置 1 小時強制踢除
                if (isLoggedIn && lastActivity > 0 && (now - lastActivity > oneHour)) {
                    forceLogout("由於您超過 1 小時未操作網頁，為了安全，系統已自動為您登出。");
                    return;
                }

                // B. 更新最後活動時間 (已登入時更新)
                if (isLoggedIn) {
                    localStorage.setItem('last_activity_time', String(now));
                    return;
                }

                // C. 🚀【雲端指紋自動認人】
                // 當被 F5 重新整理導致 isLoggedIn 變成 false 時，立刻主動發送瀏覽器特徵給 GAS 進行指紋配對
                if (!isLoggedIn) {
                    setAlertData({ message: "正在同步雲端淨塑紀錄...", type: "loading" });

                    // 抓取當前瀏覽器的 User-Agent 作為環境指紋
                    const myFingerprint = navigator.userAgent;

                    callJsonpApi('login', { isAutoCheck: "true", userAgent: myFingerprint },
                        (data) => {
                            if (data.result === "success") {
                                const currentDay = data.currentDay && data.currentDay > 0 ? data.currentDay : 1;
                                setCurrentDay(Number(currentDay));
                                if (data.uid) setUserId(String(data.uid));
                                setUserName(data.userName || "挑戰者");
                                if (data.className) setUserClassName(data.className);

                                // 1. 還原歷史抽籤清單
                                if (data.drawnOracleIds) {
                                    const ids = String(data.drawnOracleIds).split(',').map(Number).filter(Boolean);
                                    setDrawnOracleIds(ids);
                                }

                                // 2. 還原今日法語卡片
                                if (data.todayOracle && data.todayOracle !== "未抽取" && data.todayOracle !== "") {
                                    const match = String(data.todayOracle).match(/\d+/);
                                    if (match) {
                                        const oId = parseInt(match[0], 10);
                                        const foundOracle = ORACLES.find(o => Number(o.id) === oId);
                                        if (foundOracle) setDailyOracle(foundOracle);
                                    }
                                } else {
                                    setDailyOracle(null);
                                }

                                // 3. 還原 FM 口袋暫存與已完成項目
                                let targetCompletedTasks = [];
                                let currentExtra = [...DEFAULT_TASKS];

                                if (data.customPocket && data.customPocket !== "") {
                                    const pocketItems = String(data.customPocket).split(',').filter(Boolean);
                                    pocketItems.forEach(pItem => {
                                        if (!currentExtra.includes(pItem)) currentExtra.push(pItem);
                                    });
                                }

                                if (data.todayTasks && data.todayTasks !== "無" && data.todayTasks !== "" && data.todayTasks !== "未完成 any 項目") {
                                    const tasksArr = String(data.todayTasks).split("、").map(s => s.trim()).filter(x => x && x !== "未完成 any 項目");
                                    setCompletedTasks(tasksArr);
                                    setSyncedTasks(tasksArr);
                                    targetCompletedTasks = tasksArr;

                                    tasksArr.forEach(task => {
                                        if (!DEFAULT_TASKS.includes(task) && !currentExtra.includes(task)) {
                                            currentExtra.push(task);
                                        }
                                    });
                                } else {
                                    setCompletedTasks([]);
                                    setSyncedTasks([]);
                                }

                                setExtraTasks(currentExtra);
                                setBaseScore(Number(data.totalScore) || 0);
                                setReceivedLikesScore(Number(data.receivedLikesScore) || 0);

                                if (data.reports) {
                                    setWeeklyReports(prev => ({ ...prev, ...data.reports }));
                                }

                                // 補強原地切換分頁時的快取夾層
                                const dataToSaveImmediate = {
                                    lastTaskDate: new Date().toDateString(),
                                    score: Number(data.totalScore) || 0,
                                    receivedLikesScore: Number(data.receivedLikesScore) || 0,
                                    completedTasks: targetCompletedTasks,
                                    syncedTasks: targetCompletedTasks,
                                    unlockedItems: data.reports ? [] : [],
                                    weeklyReports: data.reports || weeklyReports,
                                    extraTasks: currentExtra,
                                    myGivenLikes: data.myGivenLikes ? String(data.myGivenLikes).split(',').filter(Boolean) : [],
                                    drawnOracleIds: data.drawnOracleIds ? String(data.drawnOracleIds).split(',').map(Number).filter(Boolean) : [],
                                    currentOracle: data.todayOracle ? ORACLES.find(o => Number(o.id) === parseInt(String(data.todayOracle).match(/\d+/)?.[0], 10)) : null,
                                    lastOracleDate: new Date().toDateString(),
                                    seenOracleDate: new Date().toDateString()
                                };
                                localStorage.setItem(`data_${data.uid}`, JSON.stringify(dataToSaveImmediate));

                                // 長效記住憑證安全續期
                                setSandboxCookie('no_plastic_logged_in', 'true', 30);
                                localStorage.setItem('last_activity_time', String(Date.now()));

                                setIsLoggedIn(true); // 🌟 指紋識別成功，直接進入系統！
                                setAlertData(null);
                            } else {
                                // 雲端指紋庫沒有匹配到（代表未登入或未勾選記住我），留在此頁面
                                setAlertData(null);
                            }
                        },
                        (err) => {
                            setAlertData(null);
                        }
                    );
                }
            }, [isLoggedIn]);

            // ==========================================
            // 新增：監聽使用者網頁編輯操作行為（重新計算1小時）
            // ==========================================
            useEffect(() => {
                if (!isLoggedIn) return;

                const updateActivity = () => {
                    localStorage.setItem('last_activity_time', String(Date.now()));
                };

                // 只要有 點擊、打字、滾動、觸控 就算有在操作網頁
                window.addEventListener('click', updateActivity);
                window.addEventListener('keydown', updateActivity);
                window.addEventListener('scroll', updateActivity);
                window.addEventListener('touchstart', updateActivity);

                // 每 30 秒在背景幫 user 檢查一次有沒有超時閒置
                const checkTimeoutInterval = setInterval(() => {
                    const lastActivity = parseInt(localStorage.getItem('last_activity_time') || "0", 10);
                    if (lastActivity > 0 && (Date.now() - lastActivity > 60 * 60 * 1000)) {
                        localStorage.removeItem('no_plastic_logged_in');
                        localStorage.removeItem('last_activity_time');
                        sessionStorage.removeItem('no_plastic_logged_in');
                        setIsLoggedIn(false);
                        setCustomAlert({ title: "系統通知", message: "由於您超過 1 小時未操作網頁，為了安全，系統已自動為您登出。" });
                    }
                }, 30000);

                return () => {
                    window.removeEventListener('click', updateActivity);
                    window.removeEventListener('keydown', updateActivity);
                    window.removeEventListener('scroll', updateActivity);
                    window.removeEventListener('touchstart', updateActivity);
                    clearInterval(checkTimeoutInterval);
                };
            }, [isLoggedIn]);

            const rankInfo = useMemo(() => getRankInfo(baseScore), [baseScore]);
            const isDirty = completedTasks.some(task => !syncedTasks.includes(task));

            const displayAchievementCount = useMemo(() => {
                const me = realPlayers.find(p => String(p.id) === String(userId));
                const cloudAchievements = me ? (parseScoreStr(me.achievements) || parseScoreStr(me.achievement) || parseScoreStr(me.unlockedCount) || 0) : 0;
                return Math.max(unlockedItems.length, cloudAchievements);
            }, [realPlayers, userId, unlockedItems.length]);

            const unlockProgress = useMemo(() => Math.round((displayAchievementCount / ORACLES.length) * 100), [displayAchievementCount]);

            // ==========================================
            // 終極修正 1：極簡化排行榜，徹底拔除與「自動登入」相衝的背景干擾代碼
            // ==========================================
            useEffect(() => {
                if (isLoggedIn && userId && realPlayers.length === 0 && !isLoadingRanking) {
                    fetchLeaderboard(); // 🌟 平常乖乖在 isLoggedIn 成立後去撈排行榜就好，絕不瞎攪和自動登入
                }
            }, [isLoggedIn, userId]);

            /// ==========================================
            // 優化：Cache 優先機制，重新整理秒出畫面，防止頁面卡頓
            // ==========================================
            useEffect(() => {
                const todayKey = new Date().toDateString();
                const localStr = localStorage.getItem(`data_${userId}`);

                if (localStr) {
                    try {
                        const d = JSON.parse(localStr);

                        // 讀取歷史狀態與計分
                        setBaseScore(d.score || 0);
                        setReceivedLikesScore(d.receivedLikesScore || 0);
                        setLastSavedScore(d.score || 0);
                        setUnlockedItems(d.unlockedItems || []);
                        setWeeklyReports(d.weeklyReports || weeklyReports);
                        setMyGivenLikes(d.myGivenLikes || []);
                        setDrawnOracleIds(d.drawnOracleIds || []);

                        // 核心安全檢查：如果本機快取日跟今天一樣，大膽啟用快取
                        if (d.lastOracleDate === todayKey && d.currentOracle) {
                            setDailyOracle(d.currentOracle);
                            setCompletedTasks(d.completedTasks || []);
                            setSyncedTasks(d.syncedTasks || []);
                            if (d.currentDay) setCurrentDay(Number(d.currentDay));
                            setExtraTasks(d.extraTasks || DEFAULT_TASKS);
                            if (d.seenOracleDate === todayKey) setSeenOracleDate(todayKey);
                        } else {
                            // 如果本機快取過期了 (換日了)，主動重置
                            setDailyOracle(null);
                            setCompletedTasks([]);
                            setSyncedTasks([]);
                            setExtraTasks(DEFAULT_TASKS);
                        }
                    } catch (e) {
                        console.error('LocalStorage parse error:', e);
                    }
                } else {
                    // 全新使用者保底重置
                    setDailyOracle(null);
                    setCompletedTasks([]);
                    setSyncedTasks([]);
                    setExtraTasks(DEFAULT_TASKS);
                }
                setLoadedUserId(userId);
            }, [userId]); // ➡️ 只認使用者 ID，重新整理時直接秒讀 Cache，不卡網頁！

            useEffect(() => {
                if (loadedUserId !== userId) return;

                const todayKey = new Date().toDateString();
                const dataToSave = {
                    lastTaskDate: new Date().toDateString(),
                    score: baseScore,
                    receivedLikesScore: receivedLikesScore,
                    completedTasks,
                    syncedTasks,
                    unlockedItems,
                    weeklyReports,
                    extraTasks,
                    myGivenLikes,
                    drawnOracleIds,
                    currentOracle: dailyOracle,
                    lastOracleDate: dailyOracle ? todayKey : null,
                    seenOracleDate,
                    currentDay: currentDay,
                };

                try {
                    localStorage.setItem(`data_${userId}`, JSON.stringify(dataToSave));
                } catch (e) {
                    console.error('儲存本地資料失敗:', e);
                }
            }, [baseScore, receivedLikesScore, completedTasks, unlockedItems, dailyOracle, weeklyReports, extraTasks, myGivenLikes, drawnOracleIds, loadedUserId, userId]);

            useEffect(() => {
                if (realPlayers.length > 0 && userId) {
                    const me = realPlayers.find(p => String(p.id) === String(userId));
                    if (me) {
                        setBaseScore(prev => {
                            const unsyncedCount = completedTasks.filter(x => !syncedTasks.includes(x)).length;
                            const cloudBaseScore = Math.max(parseScoreStr(me.baseScore), parseScoreStr(me.totalScore), parseScoreStr(me.score));
                            const expectedScore = cloudBaseScore + unsyncedCount;

                            if (expectedScore > prev) {
                                setLastSavedScore(cloudBaseScore);
                                return expectedScore;
                            }
                            return prev;
                        });

                        const cloudUnlockedIds = [
                            ...parseIdsStr(me.unlockedItems),
                            ...parseIdsStr(me.unlockedIds),
                            ...parseIdsStr(me.unlockedOracles),
                            ...parseIdsStr(me.achievementsList),
                            ...parseIdsStr(me.unlockedOraclesList),
                            ...parseIdsStr(me.unlocked)
                        ];

                        if (cloudUnlockedIds.length > 0) {
                            setUnlockedItems(prev => {
                                const prevIds = prev.map(i => String(i.id)).sort();
                                const newIds = [...new Set(cloudUnlockedIds)].map(String).sort();
                                if (JSON.stringify(prevIds) !== JSON.stringify(newIds)) {
                                    return [...new Set(cloudUnlockedIds)].map(id => ({ id }));
                                }
                                return prev;
                            });
                        }

                        if (me.reports) {
                            const cloudLikes = Object.values(me.reports).reduce((sum, r) => sum + (r.likes || 0), 0);
                            setReceivedLikesScore(prev => Math.max(prev, cloudLikes));

                            setWeeklyReports(prev => {
                                let updated = { ...prev };
                                let hasChanges = false;
                                for (let week in me.reports) {
                                    if (me.reports[week] && me.reports[week].submitted) {
                                        const currentPhotosStr = JSON.stringify(updated[week]?.photos || [null, null, null]);
                                        const newPhotosStr = JSON.stringify(Array.isArray(me.reports[week].photos) ? me.reports[week].photos : [null, null, null]);

                                        if (!updated[week] ||
                                            !updated[week].submitted ||
                                            updated[week].content !== me.reports[week].content ||
                                            updated[week].likes !== me.reports[week].likes ||
                                            currentPhotosStr !== newPhotosStr ||
                                            updated[week].approved !== me.reports[week].approved) {

                                            updated[week] = {
                                                ...updated[week],
                                                submitted: true,
                                                content: me.reports[week].content || "",
                                                photos: Array.isArray(me.reports[week].photos) ? me.reports[week].photos : [null, null, null],
                                                likes: me.reports[week].likes || 0,
                                                approved: me.reports[week].approved || false
                                            };
                                            hasChanges = true;
                                        }
                                    }
                                }
                                return hasChanges ? updated : prev;
                            });
                        } else if (me.receivedLikesScore !== undefined) {
                            setReceivedLikesScore(prev => Math.max(prev, parseScoreStr(me.receivedLikesScore)));
                        }
                    }
                }
            }, [realPlayers, userId]);

            const fetchLeaderboard = () => {
                setIsLoadingRanking(true);
                callJsonpApi('getLeaderboard', {},
                    (data) => {
                        if (data.result === 'success' && data.data) {
                            setRealPlayers(data.data);
                        }
                        setIsLoadingRanking(false);
                    },
                    (err) => {
                        setIsLoadingRanking(false);
                    }
                );
            };

            const checkWeekStatus = (config) => {
                if (currentTime < config.openTime) return 'waiting';
                if (currentTime >= config.closeTime) return 'closed';
                return 'open';
            };

            const fullLeaderboard = useMemo(() => {
                let leaderboard = [...realPlayers];

                const myIndex = leaderboard.findIndex(p =>
                    String(p.id) === String(userId) ||
                    (p.name === challengerName && p.className === userClassName && userClassName !== "")
                );

                if (myIndex !== -1) {
                    leaderboard[myIndex] = { ...leaderboard[myIndex], isSelf: true };
                    if (baseScore > (leaderboard[myIndex].baseScore || 0)) {
                        leaderboard[myIndex].baseScore = baseScore;
                    }
                    leaderboard[myIndex].reports = { ...(leaderboard[myIndex].reports || {}), ...weeklyReports };
                    leaderboard[myIndex].id = userId;
                } else if (userId && challengerName) {
                    leaderboard.push({
                        id: userId,
                        name: challengerName,
                        className: userClassName,
                        baseScore: baseScore,
                        achievements: displayAchievementCount,

                        setSyncing(false);

            const updateWeeklyContent = (week, content) => { setWeeklyReports(prev => ({ ...prev, [week]: { ...prev[week], content } })); };

            const handlePhotoChange = (week, index, e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 1200;
                            const MAX_HEIGHT = 1200;

                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_WIDTH) {
                                    height = Math.round((height * MAX_WIDTH) / width);
                                    width = MAX_WIDTH;
                                }
                            } else {
                                if (height > MAX_HEIGHT) {
                                    width = Math.round((width * MAX_HEIGHT) / height);
                                    height = MAX_HEIGHT;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;

                            const ctx = canvas.getContext('2d');
                            ctx.imageSmoothingEnabled = true;
                            ctx.imageSmoothingQuality = 'high';
                            ctx.drawImage(img, 0, 0, width, height);

                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.85);

                            setWeeklyReports(prev => {
                                const newPhotos = [...prev[week].photos];
                                newPhotos[index] = compressedBase64;
                                return { ...prev, [week]: { ...prev[week], photos: newPhotos } };
                            });
                        };
                        img.src = reader.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            const submitWeeklyReport = async (weekId) => {

                const photoCount = report.photos.filter(p => p !== null && p !== 'uploaded_photo_url').length;
                const contentLen = report.content.trim().length;
                if (contentLen < 50) { setCustomAlert({ title: '心得字數不足', message: `實踐心得目前為 ${contentLen} 字，請填寫超過 50 字以完整紀錄您的心路歷程。` }); return; }
                if (photoCount < 3) { setCustomAlert({ title: '照片尚未齊全', message: `目前已上傳 ${photoCount} 張紀錄照片，請務必上傳滿 3 張照片再行提交。` }); return; }

                setSubmittingWeekId(weekId);
                setAlertData({ message: '週報與照片上傳中，請耐心等候（約需 10~20 秒）...', type: 'loading' });

                // 🌟 【核心新增】：初始化上傳文字與進度條為 0%
                setUploadStatus({ percent: 0, text: '正在準備實踐心得與照片檔案...' });

                // 🌟 【核心新增】：啟動動態模擬爬升計時器（每 400 毫秒推動一次進度）
                let currentPercent = 0;
                const progressTimer = setInterval(() => {
                    if (currentPercent < 35) {
                        currentPercent += Math.floor(Math.random() * 5) + 4; // 0% ~ 35% 跑比較快 (打包階段)
                        setUploadStatus({ percent: Math.min(35, currentPercent), text: '回報上傳中，請勿關閉視窗...' });
                    } else if (currentPercent < 75) {
                        currentPercent += Math.floor(Math.random() * 3) + 1; // 35% ~ 75% 穩定推進 (網路傳輸)
                        setUploadStatus({ percent: Math.min(75, currentPercent), text: '回報上傳中，請勿關閉視窗...' });
                    } else if (currentPercent < 96) {
                        currentPercent += 1; // 75% ~ 96% 慢速微調 (等待後端雲端試算表寫入)
                        setUploadStatus({ percent: Math.min(96, currentPercent), text: '上傳即將完成...' });

                }, 400);

                const payload = {
                    action: 'submitReport',
                    uid: userId,
                    weekId: weekId,
                    content: report.content,

                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },

                    });
                    const text = await res.text();
                    const data = JSON.parse(text);

                    // 🌟 【核心新增】：後端回應成功，立刻清除計時器並強制灌滿 100%
                    clearInterval(progressTimer);
                    setUploadStatus({ percent: 100, text: '上傳圓滿成功！' });
