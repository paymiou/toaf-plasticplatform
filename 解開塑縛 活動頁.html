                                setIsLoggedIn(true);
                            } catch (err) {
                                console.error("登入還原發生錯誤:", err);
                                setIsLoggedIn(true);
                            }
                        }}
                    />
                );
            }

            if (loadedUserId !== userId) return <div className="p-10 text-center text-slate-400 font-bold">載入中...</div>;

            return (
                <div className="max-w-[360px] mx-auto bg-white min-h-screen shadow-xl relative flex flex-col border-x border-slate-200">

                    {/* ====== Alerts & Modals ====== */}
                    {showLeaveAlert && (
                        <div className="fixed inset-0 z-[130] bg-black/70 flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="bg-white rounded-[32px] p-8 text-center w-full max-w-xs shadow-2xl animate-fade-in border border-slate-100">
                                <div className="text-4xl mb-4">⚠️</div>
                                <h3 className="text-lg font-black mb-2 text-slate-800">同步上傳「未完成」</h3>
                                <p className="text-xs text-slate-500 leading-relaxed font-medium mb-6">請返回上傳，完成後再切換頁面<br /></p>
                                <div className="grid grid-cols-2 gap-3">
                                    <button
                                        onClick={() => {
                                            setBaseScore(prev => prev - (completedTasks.length - syncedTasks.length));
                                            setCompletedTasks(syncedTasks);
                                            setAllowLeave(false);
                                            setActiveTab(pendingTab);
                                            setShowLeaveAlert(false);
                                        }}
                                        className="py-3 bg-slate-200 text-slate-700 rounded-2xl font-black text-xs"
                                    >暫不上傳</button>
                                    <button onClick={() => setShowLeaveAlert(false)} className="py-3 bg-blue-900 text-white rounded-2xl font-black text-xs shadow-lg">返回上傳</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {customAlert && (
                        <div className="fixed inset-0 z-[300] bg-black/70 flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="bg-white rounded-[32px] p-8 text-center w-full max-w-xs shadow-2xl animate-fade-in border border-slate-100">
                                <div className="text-4xl mb-4">⚠️</div>
                                <h3 className="text-lg font-black mb-2 text-slate-800">{customAlert.title}</h3>
                                <p className="text-xs text-slate-500 leading-relaxed font-medium mb-6 whitespace-pre-line">{customAlert.message}</p>
                                <button onClick={() => setCustomAlert(null)} className="w-full py-3.5 bg-blue-900 text-white rounded-2xl font-black shadow-lg">確認</button>
                            </div>
                        </div>
                    )}

                    {showTaskGuide && (
                        <div className="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-md flex items-center justify-center px-6 animate-fade-in" onClick={() => setShowTaskGuide(false)}>
                            <div className="bg-white w-full max-w-[320px] rounded-[32px] p-6 shadow-2xl animate-scale-in relative border border-blue-100 flex flex-col max-h-[85vh]" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowTaskGuide(false)} className="absolute top-4 right-4 w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 font-bold hover:bg-slate-200 transition-colors z-10">&times;</button>
                                <div className="text-center mb-4 shrink-0">
                                    <h3 className="text-[17px] font-black text-blue-900 font-serif-tc tracking-widest flex items-center justify-center gap-2">
                                        📋 參考行持項目
                                    </h3>
                                    <p className="text-[10px] text-emerald-600 font-bold mt-1 tracking-widest">💡 點擊右側 ＋ 可直接新增喔！</p>
                                </div>
                                <div className="overflow-y-auto hide-scrollbar flex-1 space-y-5 px-1 pb-4">
                                    {[
                                        {
                                            level: '初階',
                                            tasks: ["今天沒有使用保鮮膜", "今天沒有喝到瓶裝水", "今天沒有用到紙餐盒", "今天沒有用到塑膠吸管", "今天沒有用到免洗餐具", "出門帶手帕", "自備環保杯買飲品", "自備餐盒買餐食", "重複使用塑膠袋", "研討班協助回報環保杯"]
                                        },
                                        {
                                            level: '中階',
                                            tasks: ["使用布衛生棉/月亮杯", "借袋子給同事/親友", "到無包裝店購物", "汽機車上有備環保袋", "網購選擇循環箱", "買咖啡用循環杯", "使用天然菜瓜布洗碗", "自製環保清潔劑", "帶鍋碗瓢盆去購物", "里仁生物袋整理好送回門市"]
                                        },
                                        {
                                            level: '高階',
                                            tasks: ["使用竹牙刷", "使用少或無包裝的皂類", "使用填充式打火機", "參與淨灘/淨山/淨街活動", "參加慈心淨塑活動", "今天出門穿有機或天然材質衣物", "推廣淨塑理念給親朋好友", "班上舉辦無塑廣供or聚餐", "自製甜點取代購買", "選擇堪用的二手物"]
                                        }
                                    ].map((category, idx) => (
                                        <div key={idx} className="animate-fade-in" style={{ animationDelay: `${idx * 0.1}s` }}>
                                            <div className="text-[11px] font-black text-white bg-blue-800 py-1.5 px-4 rounded-t-xl shadow-sm inline-block tracking-wider">
                                                {category.level}
                                            </div>
                                            <ul className="bg-slate-50 border border-slate-200 rounded-b-xl rounded-tr-xl overflow-hidden divide-y divide-slate-100">
                                                {category.tasks.map((task, i) => (
                                                    <li key={i} className="py-2.5 px-3 text-[12px] font-bold text-slate-700 flex justify-between items-center hover:bg-blue-100/50 transition-colors">
                                                        <div className="flex gap-2 items-start mr-2">
                                                            <span className="text-blue-500 font-black shrink-0 w-4">{i + 1}.</span>
                                                            <span>{task}</span>
                                                        </div>
                                                        <button
                                                            onClick={() => addCustomTask(task)}
                                                            className="w-6 h-6 rounded-full bg-blue-100 hover:bg-blue-500 hover:text-white text-blue-800 flex items-center justify-center text-xs font-black transition-colors"
                                                            title="新增至任務"
                                                        >
                                                            ＋
                                                        </button>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ====== 稱號等級表 Modal ====== */}
                    {showRankModal && (
                        <div className="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-md flex items-center justify-center px-6 animate-fade-in" onClick={() => setShowRankModal(false)}>
                            <div className="bg-white w-full max-w-[320px] rounded-[32px] p-6 shadow-2xl animate-scale-in relative border border-blue-100 flex flex-col max-h-[80vh]" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowRankModal(false)} className="absolute top-4 right-4 w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 font-bold hover:bg-slate-200 transition-colors z-10">&times;</button>
                                <div className="text-center mb-4 shrink-0">
                                    <h3 className="text-[17px] font-black text-blue-900 font-serif-tc tracking-widest flex items-center justify-center gap-2">
                                        🏆 解開塑縛 稱號表
                                    </h3>
                                    <p className="text-[11px] text-slate-400 font-bold mt-1 tracking-widest">目前累計積分：<span className="text-blue-600 text-xs font-black">{baseScore} PT</span></p>
                                </div>
                                <div className="overflow-y-auto hide-scrollbar flex-1 space-y-2 px-1 pb-4">
                                    {RANK_LIST.map((r, idx) => {
                                        const isCurrent = baseScore >= r.min && baseScore <= r.max;
                                        return (
                                            <div
                                                key={idx}
                                                className={`p-3 rounded-xl border flex items-center justify-between transition-all ${isCurrent
                                                    ? 'bg-gradient-to-r from-amber-50 to-amber-100/60 border-amber-300 ring-2 ring-amber-300/30 shadow-sm'
                                                    : 'bg-slate-50/50 border-slate-100'
                                                    }`}
                                            >
                                                <div className="text-left">
                                                    <div className="flex items-center gap-1.5">
                                                        <span className={`text-[10px] font-black ${isCurrent ? 'text-amber-800' : 'text-slate-400'}`}>{r.stage}</span>
                                                        {isCurrent && <span className="bg-amber-500 text-white text-[8px] px-1.5 py-0.5 rounded font-black uppercase tracking-tight scale-90">當前</span>}
                                                    </div>
                                                    <p className={`text-xs font-black mt-0.5 ${isCurrent ? 'text-slate-900' : 'text-slate-700'}`}>{r.title}</p>
                                                </div>
                                                <div className="text-right shrink-0">
                                                    <span className={`text-[10px] font-black px-2 py-1 rounded-lg ${isCurrent ? 'bg-amber-200 text-amber-950' : 'bg-slate-100 text-slate-500'}`}>
                                                        {r.max === Infinity ? `${r.min}分+` : `${r.min} - ${r.max}分`}
                                                    </span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ====== 操作說明 Modal ====== */}
                    {showInstructionModal && (
                        <div className="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-md flex items-center justify-center px-6 animate-fade-in" onClick={() => setShowInstructionModal(false)}>
                            <div className="bg-white w-full max-w-[300px] h-[80vh] max-h-[580px] rounded-[32px] p-5 shadow-2xl animate-scale-in relative border border-blue-100 flex flex-col" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowInstructionModal(false)} className="absolute top-3 right-3 w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 font-bold hover:bg-slate-200 transition-colors z-10">&times;</button>
                                <div className="text-center mb-4 shrink-0 pt-2">
                                    <h3 className="text-[16px] font-black text-blue-900 font-serif-tc tracking-widest flex items-center justify-center gap-2">
                                        📜 操作說明
                                    </h3>
                                    <button
                                        onClick={() => {
                                            setShowInstructionModal(false); // 1. 先優雅地關閉操作說明視窗
                                            setTimeout(() => {
                                                startTour(true); // 🌟 核心修正：傳入 true 告訴系統這是手動開啟的！
                                            }, 300);
                                        }}
                                        className="text-[11px] text-blue-600 bg-blue-50 border border-blue-200 hover:bg-blue-100 shadow-sm hover:shadow-md font-black mt-2 px-4 py-1.5 rounded-full tracking-widest transition-all active:scale-95 mx-auto flex items-center justify-center gap-1.5 cursor-pointer"
                                    >
                                        開啟導覽視窗
                                    </button>
                                </div>
                                <div className="overflow-y-auto hide-scrollbar flex-1 px-1 pb-1">
                                    <ul className="space-y-2.5">
                                        {[
                                            { text: "上師淨塑法語：每日抽取一張法語，並依法行持淨塑行動。", icon: "https://paymiou.github.io/paymiou/August/waves.png" },
                                            { text: "法語核心任務：完成核心任務即可解鎖法語成就。", icon: "https://paymiou.github.io/paymiou/August/bluestar.png" },
                                            { text: "淨塑行持積分：可從參考清單選取或自行新增項目，完成並上傳，即可獲分(Pt)。", icon: "https://paymiou.github.io/paymiou/August/reef.png" },
                                            { text: "每週實踐回報：50字心得、照片x3，每周五開放回報、周日關閉。(請在時間內完成，共 4 週)", icon: "https://paymiou.github.io/paymiou/August/contract.png" },
                                            { text: "班幹部審核：每週回報由班幹部進行審核，審核通過後記分板會呈現「藍色燈號」！", icon: "https://paymiou.github.io/paymiou/August/energy-consumption.png" },
                                            { text: "點讚系統：排行榜中同學回饋，可觀摩學習並點按讚回饋唷！", icon: "https://paymiou.github.io/paymiou/August/heart.png" },
                                            { text: "獲獎條件：取前十名", icon: "https://paymiou.github.io/paymiou/August/trophy.png", isSpecial: true, subDetails: ["1. 完成 4 週回饋，且班幹部審核通過", "2. 各項積分(Pt) 加總"] }
                                        ].map((item, i) => {
                                            const [title, description] = item.text.split("：");
                                            const themeColor = item.isSpecial ? "text-amber-600" : "text-blue-600";
                                            const bgColor = item.isSpecial ? "bg-amber-50/50 border-amber-100" : "bg-slate-50 border-slate-100";
                                            return (
                                                <li key={i} className={`flex gap-3 text-[11.5px] font-medium text-slate-600 items-start leading-snug px-3 py-2.5 rounded-xl border shadow-sm ${bgColor}`}>
                                                    <img src={item.icon} alt={title} className="w-[20px] h-[20px] object-contain mt-0.5 shrink-0" />
                                                    <span className="flex-1">
                                                        {item.isSpecial ? (
                                                            <>
                                                                <strong className={`${themeColor} font-extrabold`}>{title}</strong>
                                                                <span className="text-slate-400 font-normal mx-0.5">：</span>
                                                                <span className="text-slate-700">
                                                                    {description}
                                                                    {item.subDetails && (
                                                                        <div className="mt-2 space-y-1 border-t border-amber-200/40 pt-2 text-amber-800">
                                                                            {item.subDetails.map((sub, si) => (
                                                                                <p key={si} className="text-[11px] font-bold leading-tight">{sub}</p>
                                                                            ))}
                                                                        </div>
                                                                    )}
                                                                </span>
                                                            </>
                                                        ) : (
                                                            <div className="flex flex-col">
                                                                <strong className={`${themeColor} font-extrabold mb-1`}>{title}</strong>
                                                                <span className="text-slate-700">
                                                                    {description.includes("(請在時間內完成，共 4 週)") ? (
                                                                        <>
                                                                            {description.replace("(請在時間內完成，共 4 週)", "")}
                                                                            <span className="text-slate-400 text-[11px] font-normal block mt-1 leading-tight">(請在時間內完成，共 4 週)</span>
                                                                        </>
                                                                    ) : description}
                                                                </span>
                                                            </div>
                                                        )}
                                                    </span>
                                                </li>
                                            );
                                        })}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ====== 💡 智慧高光聚焦與智慧滾動貼合引導系統 (Fixed 完美對齊滿版) ====== */}
                    {tourIndex >= 0 && (
                        <div
                            className="fixed inset-0 z-[99999] overflow-hidden pointer-events-none animate-fade-in touch-none"
                            onWheel={(e) => e.stopPropagation()}
                            onTouchMove={(e) => {
                                if (activeSpotlight && activeSpotlight.target === 'draw-btn') return;
                                e.preventDefault();
                            }}
                        >

                            {/* 1. 物理裁切防護罩：在滿版黑布中精準挖洞 */}
                            {activeSpotlight ? (
                                <div
                                    className={`absolute inset-0 bg-slate-950/50 transition-all duration-300 ${activeSpotlight.target === 'draw-btn' ? 'pointer-events-none' : 'pointer-events-auto'}`}
                                    style={{
                                        /* 🌟 終極重構：如果啟用雙框模式，clipPath 同時精準在黑布上挖出兩個獨立的洞 */
                                        clipPath: activeSpotlight.isDual ? `polygon(
                        0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%,
                        ${activeSpotlight.box1.left - 4}px ${activeSpotlight.box1.top - 4}px,
                        ${activeSpotlight.box1.left - 4}px ${activeSpotlight.box1.top + activeSpotlight.box1.height + 4}px,
                        ${activeSpotlight.box1.left + activeSpotlight.box1.width + 4}px ${activeSpotlight.box1.top + activeSpotlight.box1.height + 4}px,
                        ${activeSpotlight.box1.left + activeSpotlight.box1.width + 4}px ${activeSpotlight.box1.top - 4}px,
                        ${activeSpotlight.box1.left - 4}px ${activeSpotlight.box1.top - 4}px,
                        0% 0%,
                        ${activeSpotlight.box2.left - 4}px ${activeSpotlight.box2.top - 4}px,
                        ${activeSpotlight.box2.left - 4}px ${activeSpotlight.box2.top + activeSpotlight.box2.height + 4}px,
                        ${activeSpotlight.box2.left + activeSpotlight.box2.width + 4}px ${activeSpotlight.box2.top + activeSpotlight.box2.height + 4}px,
                        ${activeSpotlight.box2.left + activeSpotlight.box2.width + 4}px ${activeSpotlight.box2.top - 4}px,
                        ${activeSpotlight.box2.left - 4}px ${activeSpotlight.box2.top - 4}px
                    )` : `polygon(
                        0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%,
                        ${activeSpotlight.left - 4}px ${activeSpotlight.target === 'nav-collection' ? activeSpotlight.top - 10 : activeSpotlight.top - 4}px,
                        ${activeSpotlight.left - 4}px ${activeSpotlight.top + activeSpotlight.height + 4}px,
                        ${activeSpotlight.left + activeSpotlight.width + 4}px ${activeSpotlight.top + activeSpotlight.height + 4}px,
                        ${activeSpotlight.left + activeSpotlight.width + 4}px ${activeSpotlight.target === 'nav-collection' ? activeSpotlight.top - 10 : activeSpotlight.top - 4}px,
                        ${activeSpotlight.left - 4}px ${activeSpotlight.target === 'nav-collection' ? activeSpotlight.top - 10 : activeSpotlight.top - 4}px
                    )`
                                    }}
                                    onTouchMove={(e) => {
                                        if (activeSpotlight.target === 'draw-btn') return;
                                        e.preventDefault();
                                    }}
                                />
                            ) : (
                                <div className="absolute inset-0 bg-slate-950/50 pointer-events-auto" onTouchMove={(e) => e.preventDefault()} />
                            )}

                            {/* 2. 綠色邊框輔助層 */}
                            {activeSpotlight && (
                                activeSpotlight.isDual ? (
                                    /* 🌟 終極重構：雙框模式下，同時渲染兩套獨立的亮綠色聚焦邊框 */
                                    <>
                                        <div className="fixed rounded-2xl border-4 border-emerald-400 bg-transparent z-[100000] pointer-events-none transition-all duration-300"
                                            style={{ top: `${activeSpotlight.box1.top - 4}px`, left: `${activeSpotlight.box1.left - 4}px`, width: `${activeSpotlight.box1.width + 8}px`, height: `${activeSpotlight.box1.height + 8}px` }} />
                                        <div className="fixed rounded-2xl border-4 border-emerald-400 bg-transparent z-[100000] pointer-events-none transition-all duration-300"
                                            style={{ top: `${activeSpotlight.box2.top - 4}px`, left: `${activeSpotlight.box2.left - 4}px`, width: `${activeSpotlight.box2.width + 8}px`, height: `${activeSpotlight.box2.height + 8}px` }} />
                                    </>
                                ) : (
                                    <div className="fixed rounded-2xl border-4 border-emerald-400 bg-transparent z-[100000] pointer-events-none transition-all duration-300"
                                        style={{
                                            top: `${activeSpotlight.target === 'nav-collection' ? activeSpotlight.top - 10 : activeSpotlight.top - 4}px`,
                                            left: `${activeSpotlight.left - 4}px`,
                                            width: `${activeSpotlight.width + 8}px`,
                                            height: `${activeSpotlight.target === 'nav-collection' ? activeSpotlight.height + 6 : activeSpotlight.height + 8}px`
                                        }}
                                    />
                                )
                            )}

                            {/* 3. 動態定位引導提示卡片 */}
                            <div
                                className="fixed left-1/2 z-[100001] w-[calc(100%-32px)] max-w-[320px] transition-all duration-300 pointer-events-auto"
                                style={(() => {
                                    if (!activeSpotlight) return { top: '50%', transform: 'translate(-50%, -50%)' };

                                    // 1. 第八步 (原本第七步的 task-area)：雙高光維持在兩個框的正中央
                                    if (activeSpotlight.isDual) {
                                        const b1 = activeSpotlight.box1;
                                        const b2 = activeSpotlight.box2;
                                        const midY = (b1.top + b1.height + b2.top) / 2;
                                        return { top: `${midY}px`, transform: 'translate(-50%, -50%)' };
                                    }

                                    // 2. 第三、四、五步 (三個上方頁籤)：統一設定在「綠框的上方」
                                    const aboveTargets = ['nav-collection', 'nav-report', 'nav-ranking'];
                                    if (aboveTargets.includes(activeSpotlight.target)) {
                                        let calculatedTop = activeSpotlight.top - 230;
                                        if (calculatedTop < 10) calculatedTop = 10;
                                        return { top: `${calculatedTop}px`, transform: 'translateX(-50%)' };
                                    }

                                    // 3. 第六步 (抽卡按鈕)：維持原本的上方安全定位
                                    if (activeSpotlight.target === 'draw-btn') {
                                        const vh = window.innerHeight;
                                        let calculatedTop = activeSpotlight.top - 165;
                                        if (calculatedTop < 10) calculatedTop = 10;
                                        if (calculatedTop > vh - 245) calculatedTop = vh - 245;
                                        return { top: `${calculatedTop}px`, transform: 'translateX(-50%)' };
                                    }

                                    // 🌟 4. 第七步(核心任務)、第九步(水母) 與其他預設目標：乖乖待在綠框的「正下方」
                                    return { top: `${activeSpotlight.top + activeSpotlight.height + 14}px`, transform: 'translateX(-50%)' };
                                })()}
                                onTouchMove={(e) => e.stopPropagation()}
                            >

                                <div className="bg-white text-slate-800 rounded-[28px] p-5 shadow-[0_20px_50px_rgba(0,0,0,0.4)] border border-slate-100 text-left">
                                    <div className="flex justify-between items-center mb-2.5">
                                        <span className="text-[10px] bg-emerald-50 text-emerald-700 px-2.5 py-0.5 rounded-full font-black tracking-wider">
                                            步驟說明 ({tourIndex + 1} / {TOUR_STEPS.length})
                                        </span>
                                        <button onClick={() => { setTourIndex(-1); setActiveSpotlight(null); }} className="text-slate-400 font-bold text-lg hover:text-slate-600">&times;</button>
                                    </div>

                                    <h4 className="text-[15px] font-black text-slate-900 font-serif-tc tracking-wide mb-1.5 flex items-center gap-1.5">
                                        {TOUR_STEPS[tourIndex].title}
                                    </h4>
                                    <div className="text-[12px] text-slate-500 font-bold leading-relaxed mb-4 text-justify">
                                        {TOUR_STEPS[tourIndex].content}
                                    </div>

                                    <div className="flex items-center justify-between gap-3 pt-2.5 border-t border-slate-100">
                                        {/* 🌟 核心修正：加入 tourIndex !== 6 的判斷，讓第七步徹底隱藏回上一步按鈕 */}
                                        {tourIndex > 0 && tourIndex !== 6 ? (
                                            <button
                                                onClick={handleTourPrev}
                                                className="text-[12px] text-slate-400 hover:text-blue-900 font-black tracking-widest transition-colors"
                                            >
                                                ⬅ 回上一步
                                            </button>
                                        ) : (

{/* ====== Header ====== */}

                                                                    {/* 進度條外框 */}
                                                                    <div className="h-2 w-full bg-slate-200 rounded-full overflow-hidden p-[1px]">
                                                                        {/* 動態進度條內襯 */}
                                                                        <div
                                                                            className="h-full bg-gradient-to-r from-blue-500 to-cyan-400 rounded-full transition-all duration-300 ease-out shadow-[0_0_6px_rgba(59,130,246,0.5)]"
                                                                            style={{ width: `${uploadStatus.percent}%` }}
                                                                        ></div>
                                                                    </div>
                                                                    <p className="text-[9px] text-slate-400 font-bold tracking-wider animate-pulse">請勿關閉或重新整理網頁，全速奔跑中...</p>
                                                                </div>
                                                            ) : (
                                                                // 🔴 狀態一：尚未提交，顯示正常按鈕
                                                                <button
                                                                    onClick={() => submitWeeklyReport(config.id)}
                                                                    disabled={!canSubmit || submittingWeekId === config.id}
                                                                    id="tour-nav-report"
                                                                    className={`w-full py-4 rounded-2xl text-[11px] font-black shadow-lg transition-all active:scale-95 uppercase tracking-widest flex items-center justify-between px-6 ${canSubmit && submittingWeekId !== config.id ? 'bg-blue-900 text-white hover:shadow-xl' : 'bg-slate-100 text-slate-400 border border-slate-200'}`}
                                                                >
                                                                    <span className="flex items-center gap-1.5">
                                                                        <img src="https://paymiou.github.io/paymiou/August/diskette.png" className="w-4 h-4 object-contain" alt="diskette" />
                                                                        儲存並提交本週週報
                                                                    </span>
                                                                    <span>➔</span>
                                                                </button>
                                                            )
                                                        ) : (
                                                            // 當已經提交時，根據審核狀態顯示對應的提示牌
                                                            report.submitted && (
                                                                report.approved ? (
                                                                    // 🔵 狀態三：審核通過 ➔ 修正為 w-[18px] h-[18px] 確保各瀏覽器尺寸正常
                                                                    <div className="w-full py-3.5 bg-cyan-50 border border-cyan-200 rounded-2xl text-cyan-700 text-xs font-black tracking-widest flex items-center justify-center gap-2 shadow-sm animate-fade-in">
                                                                        <img src="https://paymiou.github.io/paymiou/August/like.png" className="w-[18px] h-[18px] object-contain" alt="like" />
                                                                        已審核通過！
                                                                    </div>
                                                                ) : (
                                                                    // 🟡 狀態二：審核中 ➔ 修正為 animate-[spin_3s_linear_infinite] 讓沙漏動起來
                                                                    <div className="w-full py-3.5 bg-amber-50 border border-amber-200 rounded-2xl text-amber-700 text-xs font-black tracking-widest flex items-center justify-center gap-2 shadow-sm animate-fade-in">
                                                                        <img src="https://paymiou.github.io/paymiou/August/hourglass.png" className="w-4 h-4 object-contain animate-[spin_3s_linear_infinite]" alt="hourglass" />
                                                                        提交成功，班幹部審核中...
                                                                    </div>
                                                                )
                                                            )
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

{/* --- Tab: 排行榜 --- */}
                        {activeTab === 'ranking' && (
                            <div className="animate-fade-in pb-10 px-1">
                                <div className="flex justify-between items-center mb-6 relative">
                                    <div className="w-10"></div>
                                    <div className="text-center">
                                        <h3 className="text-xl font-black text-slate-800 font-serif-tc tracking-widest">實踐排行榜</h3>
                                        <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-1">Plastic-Free Leaderboard</p>
                                    </div>
                                    <div className="w-10 flex justify-end">
                                        <button 
                                            onClick={fetchLeaderboard} 
                                            disabled={isLoadingRanking} 
                                            id="tour-nav-ranking" 
                                            className="w-9 h-9 bg-blue-50 text-blue-700 rounded-full hover:bg-blue-100 transition-colors shadow-sm border border-blue-100 flex items-center justify-center active:scale-95 disabled:opacity-50" 
                                            title="手動更新資料"
                                        >
                                            <img src="https://paymiou.github.io/paymiou/August/loading-arrow.png" className={`w-4 h-4 object-contain ${isLoadingRanking ? 'animate-spin' : ''}`} alt="refresh" />
                                        </button>
                                    </div>
                                </div>

                                {/* 🌟 核心功能新增：成果展跨頁傳送門按鈕（排版獨立，絕不推擠既有排版） */}
                                <div className="mb-6 px-1">
                                    <a 
                                        href="https://paymiou.github.io/toaf-plasticplatform/解開塑縛 成果頁.html"
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="w-full h-12 bg-gradient-to-r from-cyan-500 via-blue-600 to-indigo-900 text-white rounded-2xl font-black text-xs tracking-widest flex items-center justify-center gap-2 shadow-md hover:opacity-95 active:scale-95 transition-all shadow-indigo-900/10"
                                    >
                                        🏆 點擊前往觀摩【三十無塑實踐．成果展】 ➔
                                    </a>
                                </div>

                                <div className="grid grid-cols-3 gap-2 mb-6">
                                    <div className="bg-white border border-indigo-100 rounded-[14px] py-3 px-1 text-center shadow-[0_4px_12px_-4px_rgba(49,46,129,0.15)] relative overflow-hidden group">
                                        <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-indigo-50/80 via-white to-blue-50/80 pointer-events-none"></div>
                                        <div className="relative z-10">
                                            <p className="text-[8px] text-indigo-800/70 font-black tracking-widest mb-1 whitespace-nowrap scale-95">實踐總人數</p>
                                            <div className="flex items-center justify-center gap-1">
                                                <span className="text-[10px] animate-pulse">🌍</span>
                                                <p className="text-lg font-black text-indigo-900 italic tracking-tighter drop-shadow-sm">{fullLeaderboard.length}</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white border border-blue-100 rounded-[14px] py-3 px-1 text-center shadow-[0_4px_12px_-4px_rgba(30,58,138,0.15)] relative overflow-hidden group">
                                        <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-blue-50/80 via-white to-cyan-50/80 pointer-events-none"></div>
                                        <div className="relative z-10">
                                            <p className="text-[8px] text-blue-800/70 font-black tracking-widest mb-1 whitespace-nowrap scale-95">行持總積分</p>
                                            <div className="flex items-center justify-center gap-1">
                                                <span className="text-[10px] opacity-80">🏆</span>
                                                <p className="text-lg font-black text-blue-900 italic tracking-tighter drop-shadow-sm">{globalBaseScore}</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white border border-cyan-100 rounded-[14px] py-3 px-1 text-center shadow-[0_4px_12px_-4px_rgba(6,182,212,0.15)] relative overflow-hidden group">
                                        <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-cyan-50/80 via-white to-blue-50/80 pointer-events-none"></div>
                                        <div className="relative z-10">
                                            <p className="text-[8px] text-cyan-800/70 font-black tracking-widest mb-1 whitespace-nowrap scale-95">累計讚數</p>
                                            <div className="flex items-center justify-center gap-1">
                                                <span className="text-[10px] text-pink-400 drop-shadow-sm">❤️</span>
                                                <p className="text-lg font-black text-cyan-900 italic tracking-tighter drop-shadow-sm">{globalLikesScore}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="mb-6 relative">
                                    <input
                                        type="text"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        placeholder="輸入班別或挑戰者名稱..."
                                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 pl-10 text-[13px] font-bold focus:outline-none focus:border-blue-400 transition-colors shadow-sm"
                                    />
                                    <svg className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                    </svg>
                                    {searchQuery && (
                                        <button
                                            onClick={() => setSearchQuery('')}
                                            className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors"
                                        >
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                        </button>
                                    )}
                                </div>

                                <div className="space-y-2.5">
                                    {isLoadingRanking ? (
                                        <div className="flex justify-center items-center py-10">
                                            <div className="animate-spin rounded-full h-8 w-8 border-[3px] border-slate-200 border-t-blue-800"></div>
                                        </div>
                                    ) : (
                                        (() => {
                                            const leaderboardWithRank = fullLeaderboard.map((p, i) => ({ ...p, originalRank: i }));

                                            const displayLeaderboard = searchQuery.trim()
                                                ? leaderboardWithRank.filter(p =>
                                                    p.name.includes(searchQuery.trim()) ||
                                                    (p.className && p.className.includes(searchQuery.trim()))
                                                )
                                                : leaderboardWithRank;

                                            if (displayLeaderboard.length === 0) {
                                                return (
                                                    <div className="text-center text-slate-400 py-10 font-bold text-[13px] bg-slate-50 rounded-2xl border border-dashed border-slate-200">
                                                        找不到符合「{searchQuery}」的紀錄
                                                    </div>
                                                );
                                            }

                                            return displayLeaderboard.map((player) => {
                                                const index = player.originalRank;
                                                const pRank = getRankInfo(player.baseScore);
                                                const isTop3 = index < 3;
                                                const isExpanded = expandedPlayerId === player.id;
                                                const playerLikes = player.isSelf ? receivedLikesScore : Object.values(player.reports || {}).reduce((sum, r) => sum + (r.likes || 0), 0);

                                                let rankStyles = "";
                                                let textPrimary = "text-slate-800";
                                                let textSecondary = "text-slate-400";
                                                let scoreColor = "text-slate-800";

                                                if (index === 0) {
                                                    rankStyles = "bg-gradient-to-r from-amber-400 via-amber-500 to-amber-600 shadow-amber-200 shadow-lg scale-[1.01] border-amber-300";
                                                    textPrimary = "text-white"; textSecondary = "text-amber-100"; scoreColor = "text-white";
                                                } else if (index === 1) {
                                                    rankStyles = "bg-gradient-to-r from-slate-300 via-slate-400 to-slate-500 shadow-slate-200 shadow-md border-slate-200";
                                                    textPrimary = "text-white"; textSecondary = "text-slate-100"; scoreColor = "text-white";
                                                } else if (index === 2) {
                                                    rankStyles = "bg-gradient-to-r from-orange-400 via-orange-500 to-orange-600 shadow-orange-200 shadow-md border-orange-300";
                                                    textPrimary = "text-white"; textSecondary = "text-orange-100"; scoreColor = "text-white";
                                                } else if (player.isSelf) {
                                                    rankStyles = "bg-blue-900 border-blue-900 shadow-blue-200 shadow-lg ring-4 ring-blue-100";
                                                    textPrimary = "text-white"; textSecondary = "text-blue-200"; scoreColor = "text-white";
                                                } else {
                                                    rankStyles = "bg-white border-slate-100 shadow-sm";
                                                }

                                                const submittedReports = Object.keys(player.reports || {})
                                                    .filter(weekId => player.reports[weekId].submitted)
                                                    .map(weekId => ({ weekId, ...player.reports[weekId] }));

                                               return (
                                   // 🌟 核心功能新增：如果該列是自己，就綁定專屬 ID 供 JavaScript 秒速追蹤定位
                                   <div key={player.id} id={player.isSelf ? "leaderboard-self" : undefined} className="transition-all duration-300 text-left">

                                                        <div
                                                            onClick={() => setExpandedPlayerId(isExpanded ? null : player.id)}
                                                            className={`flex items-center gap-3 py-2.5 px-4 rounded-xl border transition-all relative overflow-hidden cursor-pointer ${rankStyles} ${isExpanded ? 'rounded-b-none border-b-0' : ''}`}
                                                        >
                                                            <div className="flex flex-col items-center justify-center w-8 relative">
                                                                <span className={`text-xs font-black italic ${isTop3 ? 'text-white text-base' : player.isSelf ? 'text-white' : 'text-slate-300'}`}>{index + 1}</span>
                                                            </div>
                                                            <div className="flex-1 text-left">
                                                                <div className="flex items-center gap-1.5">
                                                                    <span className={`text-[13px] font-black tracking-wide ${textPrimary}`}>
                                                                        {player.className ? `${player.className} ${player.name}` : player.name}
                                                                    </span>
                                                                    {player.isSelf && <span className={`${isTop3 ? 'bg-white/20' : 'bg-white'} ${isTop3 ? 'text-white' : 'text-blue-900'} text-[8px] px-1.5 py-0.5 rounded font-black uppercase tracking-tighter`}>ME</span>}
                                                                </div>
                                                                <p className={`text-[9px] font-bold ${textSecondary}`}>{pRank.title}</p>
                                                            </div>
                                                            <div className="text-right flex flex-col items-end justify-center">
                                                                <div className="flex items-center justify-end gap-1 mb-0.5">
                                                                    <span className={`text-[15px] font-black italic tracking-tighter ${scoreColor}`}>{player.baseScore}</span>
                                                                    <span className={`text-[7px] font-black uppercase tracking-tighter opacity-60 ${scoreColor}`}>PT</span>
                                                                </div>
                                                                <div className={`flex items-center justify-end gap-1.5 text-[8px] font-black ${isTop3 || player.isSelf ? 'text-white/90' : 'text-slate-400'}`}>
                                                                    <span className="flex items-center gap-0.5"><Icons.Sparkles /> {player.achievements}</span>
                                                                    <span className="flex items-center gap-0.5"><span className="text-[7px] opacity-80">❤️</span> {playerLikes}</span>
                                                                </div>
                                                                <div className={`mt-0.5 text-[8px] transition-transform ${isExpanded ? 'rotate-180' : ''} ${isTop3 || player.isSelf ? 'text-white/60' : 'text-slate-300'}`}>
                                                                    ▼
                                                                </div>
                                                            </div>
                                                        </div>

                                                        {isExpanded && (
                                                            <div className="p-3.5 bg-slate-50 border border-t-0 border-slate-200 rounded-b-xl shadow-inner animate-fade-in text-left">
                                                                {submittedReports.length === 0 ? (
                                                                    <p className="text-center text-xs text-slate-400 font-bold py-4">這位玩家尚無公開的回饋紀錄</p>
                                                                ) : (
                                                                    <div className="space-y-4">
                                                                        {submittedReports.map(report => {
                                                                            const weekConfig = WEEKLY_CONFIG.find(w => w.id === report.weekId);
                                                                            const likeKey = `${player.id}_${report.weekId}`;
                                                                            const hasLiked = myGivenLikes.includes(likeKey);
                                                                            const isMe = player.isSelf;

                                                                            return (
                                                                                <div key={report.weekId} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm text-left">
                                                                                    <div className="flex justify-between items-center mb-2 pb-2 border-b border-slate-50">
                                                                                        <div className="flex items-center gap-2">
                                                                                            <span className="text-xs font-black text-[#173E98]">{weekConfig?.title}心得</span>
                                                                                            <img
                                                                                                src={(report.approved === true || String(report.approved).trim().toUpperCase() === 'V') ? "https://paymiou.github.io/paymiou/August/approval.png" : "https://paymiou.github.io/paymiou/August/Under%20review.png"}
                                                                                                className="h-[18px] object-contain drop-shadow-sm cursor-pointer hover:scale-110 transition-transform active:scale-95"
                                                                                                alt="status"
                                                                                                title="點擊查看狀態"
                                                                                                onClick={(e) => {
                                                                                                    e.stopPropagation();
                                                                                                    const isApproved = (report.approved === true || String(report.approved).trim().toUpperCase() === 'V');
                                                                                                    showToast(isApproved ? '班幹部審核通過' : '班幹部審核中', isApproved ? 'approved' : 'pending');
                                                                                                }}
                                                                                            />
                                                                                        </div>
                                                                                        <button
                                                                                            onClick={(e) => handleLikeClick(player.id, report.weekId, e)}
                                                                                            disabled={isMe || hasLiked}
                                                                                            className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-[11px] font-black transition-all ${isMe ? 'bg-slate-100 text-slate-400 cursor-not-allowed' :
                                                                                                hasLiked ? 'bg-pink-50 text-pink-500 border border-pink-200' : 'bg-slate-100 text-slate-500 hover:bg-pink-50 hover:text-pink-500 active:scale-90'
                                                                                                }`}
                                                                                        >
                                                                                            <span className={hasLiked ? 'text-pink-500' : 'text-slate-400'}>{hasLiked ? '❤️' : '🤍'}</span>
                                                                                            <span>{report.likes || 0}</span>
                                                                                        </button>
                                                                                    </div>
                                                                                    <p className="text-[12px] text-slate-700 font-bold leading-relaxed whitespace-pre-wrap break-words overflow-wrap-anywhere text-justify mb-3">
                                                                                        {report.content}
                                                                                    </p>
                                                                                    <div className="grid grid-cols-3 gap-2">
                                                                                        {report.photos.map((photo, i) => {
                                                                                            const isValidPhoto = photo && photo !== 'uploaded_photo_url';
                                                                                            return (
                                                                                                <div
                                                                                                    key={i}
                                                                                                    className={`aspect-square bg-slate-100 rounded-lg flex items-center justify-center border border-slate-200 overflow-hidden ${isValidPhoto ? 'cursor-pointer hover:opacity-85' : ''}`}
                                                                                                    onClick={() => {
                                                                                                        if (isValidPhoto) {
                                                                                                            const rawValidPhotos = report.photos.filter(p => p && p !== 'uploaded_photo_url');
                                                                                                            const validPhotos = rawValidPhotos.map(getDirectImageUrl);
                                                                                                            setLightbox({ isOpen: true, photos: validPhotos, currentIndex: rawValidPhotos.indexOf(photo) });
                                                                                                        }
                                                                                                    }}
                                                                                                >
                                                                                                    {isValidPhoto ? (
                                                                                                        <img src={getDirectImageUrl(photo)} className="w-full h-full object-cover" alt="photo" />
                                                                                                    ) : (
                                                                                                        <img src="https://paymiou.github.io/paymiou/August/reef.png" className="w-6 h-6 opacity-30 grayscale" alt="placeholder" />
                                                                                                    )}
                                                                                                </div>
                                                                                            );
                                                                                        })}
                                                                                    </div>
                                                                                </div>
                                                                            );
                                                                        })}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            });
                                        })()
                                    )}
                                </div>
                            </div>
                        )}

                        {/* --- Tab: 法語成就 --- */}
                        {activeTab === 'collection' && (
                            <div className="animate-fade-in space-y-6 py-2 px-1">
                                <div className="text-center mb-6">
                                    <div className="inline-block px-8 py-2 border-y-2 border-slate-800 mb-2">
                                        <h3 className="text-xl font-black text-slate-800 tracking-widest font-serif-tc">上師淨塑法語</h3>
                                    </div>
                                    <p className="text-[9px] text-slate-400 font-bold uppercase tracking-widest text-center">Achievement Lock & Collection</p>
                                </div>
                                <div className="space-y-8">
                                    {paginatedOracles.map(o => {
                                        const isUnlocked = unlockedItems.some(it => String(it.id) === String(o.id));
                                        return (
                                            <div key={o.id} className="relative group animate-fade-in text-left">
                                                <div className="absolute -top-3 -left-2 z-10">
                                                    <div className={`text-[10px] font-black px-2.5 py-1 rounded-br-xl shadow-md font-serif-tc ${isUnlocked ? 'bg-blue-900 border border-blue-800 text-white' : 'bg-slate-200 text-slate-400'}`}>第 {o.id} 則</div>
                                                </div>
                                                <div className={`border rounded-2xl p-6 pt-8 shadow-sm transition-all relative overflow-hidden ${isUnlocked ? 'border-blue-200 hover:shadow-md bg-white bg-gradient-to-br from-white via-blue-50/50 to-cyan-50/80' : 'bg-white border-slate-100 opacity-60'}`}>
                                                    <div className="absolute top-2 right-4 flex items-center gap-1">
                                                        {isUnlocked ? <span className="text-[10px] font-black text-blue-600 flex items-center gap-1"><img src="https://paymiou.github.io/paymiou/August/waves.png" className="w-3 h-3 object-contain opacity-50" alt="wave" /> 已達成</span> : <span className="text-[10px] font-black text-slate-300 flex items-center gap-1">🔒 待解鎖</span>}
                                                    </div>
                                                    <div className="relative z-10">
                                                        <h4 className={`text-xs font-black mb-3 flex items-center gap-2 ${isUnlocked ? 'text-blue-900' : 'text-slate-300'}`}>{o.title}</h4>
                                                        {isUnlocked ? <div className="pl-3 border-l-2 border-blue-400"><p className="text-[12px] text-slate-700 font-bold leading-relaxed font-serif-tc text-justify">{o.content}</p></div> : <div className="pl-3 border-l border-slate-50 py-3 flex items-center justify-center bg-slate-50/30 rounded-r-xl text-slate-200 text-[10px] font-bold italic">完成每日任務即可解鎖</div>}
                                                    </div>
                                                    {isUnlocked && (
                                                        <>
                                                            <div className="absolute -right-8 -top-8 w-24 h-24 bg-blue-400/10 rounded-full blur-xl pointer-events-none"></div>
                                                            <div className="absolute -left-10 -bottom-10 w-32 h-32 bg-cyan-400/10 rounded-full blur-xl pointer-events-none"></div>
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="flex justify-center items-center gap-2 mt-10 mb-8 pb-4">
                                    {Array.from({ length: totalPages }, (_, i) => i + 1).map(page => (
                                        <button key={page} onClick={() => { setCurrentPage(page); }} className={`w-8 h-8 rounded-full font-black text-[10px] transition-all border ${currentPage === page ? 'bg-gradient-to-r from-blue-600 to-blue-800 text-white border-transparent shadow-md scale-110' : 'bg-white text-slate-400 border-slate-100 hover:border-blue-300 hover:text-blue-600'}`}>{page}</button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="p-5 text-center bg-white border-t border-slate-50">
                        <p className="text-[8px] text-slate-300 font-black tracking-[0.3em] uppercase text-center">Plastic-Free Action · 2026</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
